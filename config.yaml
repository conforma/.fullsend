# fullsend organization configuration
# https://github.com/fullsend-ai/fullsend
#
# This file is managed by fullsend. Manual edits may be overwritten.
version: "1"
dispatch:
    platform: github-actions
    mode: oidc-mint
inference:
    provider: vertex
defaults:
    roles:
        - fullsend
        - triage
        - coder
        - fix
        - review
        - retro
        - prioritize
    max_implementation_retries: 2
    auto_merge: false
repos:
    .fullsend:
        enabled: false
    .github:
        enabled: false
    action-validate-image:
        enabled: false
    claude-skills:
        enabled: false
    cli:
        enabled: true
    community:
        enabled: false
    config:
        enabled: false
    conforma.github.io:
        enabled: true
    crds:
        enabled: false
    demos:
        enabled: false
    e2e-tests:
        enabled: false
    github-workflows:
        enabled: false
    go-gather:
        enabled: false
    golden-container:
        enabled: false
    golden-rpm:
        enabled: false
    hacks:
        enabled: false
    hooks:
        enabled: false
    infra-deployments-ci:
        enabled: false
    knative-service:
        enabled: false
    policy:
        enabled: true
    policy-builder:
        enabled: false
    pr-agent-settings:
        enabled: false
    pr-size-label-action:
        enabled: false
    review-rot:
        enabled: false
    step-actions:
        enabled: false
    tekton-catalog:
        enabled: false
    user-guide:
        enabled: false
allowed_remote_resources:
    - https://raw.githubusercontent.com/fullsend-ai/fullsend/
    - https://raw.githubusercontent.com/fullsend-ai/agents/
